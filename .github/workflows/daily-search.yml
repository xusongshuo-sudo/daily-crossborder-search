name: Daily GitHub Search

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run search
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/search.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json reports/
          git diff --staged --quiet || (
            git commit -m "bot: daily search $(date +%Y-%m-%d)"
            git push
          )
      
      - name: Send email
        run: |
          python3 -c "
          import smtplib, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from pathlib import Path

          report = Path('reports/latest.md').read_text(encoding='utf-8')

          msg = MIMEMultipart('alternative')
          msg['Subject'] = 'GitHub 跨境电商+AI 日报'
          msg['From'] = os.environ['MAIL_USERNAME']
          msg['To'] = os.environ['MAIL_TO']
          msg.attach(MIMEText(report, 'html', 'utf-8'))

          with smtplib.SMTP_SSL('smtp.qq.com', 465) as smtp:
              smtp.login(os.environ['MAIL_USERNAME'], os.environ['MAIL_PASSWORD'])
              smtp.send_message(msg)
          print('Email sent')
          "
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
